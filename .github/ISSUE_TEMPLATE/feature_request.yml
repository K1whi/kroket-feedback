name: 💡 Proposer une fonctionnalité
description: Une idée pour améliorer Kroket
title: "[Idée] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Merci pour votre idée ! N'hésitez pas à regarder d'abord les [idées existantes](../../issues?q=is%3Aissue+label%3Aenhancement) pour voter plutôt que créer un doublon.
  - type: textarea
    id: idea
    attributes:
      label: Votre idée
      description: Que souhaiteriez-vous voir dans l'app ?
      placeholder: "Ex : pouvoir comparer deux produits côte à côte."
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Quel problème cela résoudrait-il ?
      description: Dans quelle situation cette fonctionnalité vous aiderait ?
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: Plateforme concernée
      options:
        - Les deux
        - Android
        - iOS
    validations:
      required: false
